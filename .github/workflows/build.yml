name: Build WolfLoom Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # optional manual trigger

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile server/host.py --name wolfloom-server-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolfloom-server-linux
          path: dist/wolfloom-server-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r server\requirements.txt
          pip install pyinstaller

      - name: Build Windows binary
        run: |
          pyinstaller --onefile server\host.py --name wolfloom-server.exe
        shell: powershell

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolfloom-server.exe
          path: dist\wolfloom-server.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wolfloom-server-linux
          path: ./dist

      - uses: actions/download-artifact@v4
        with:
          name: wolfloom-server.exe
          path: ./dist

      - name: Create or update release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
