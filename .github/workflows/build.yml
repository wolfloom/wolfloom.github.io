name: Build WolfLoom Binaries

# Trigger automatically on push to main + optional manual trigger
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Needed so the release step can create/update releases
permissions:
  contents: write

jobs:
  # ---------------- Linux Build ----------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile server/host.py --name wolfloom-server-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolfloom-server-linux
          path: dist/wolfloom-server-linux

  # ---------------- Windows Build ----------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r server\requirements.txt
          pip install pyinstaller

      - name: Build Windows binary
        run: |
          pyinstaller --onefile server\host.py --name wolfloom-server.exe
        shell: powershell

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolfloom-server.exe
          path: dist/wolfloom-server.exe

  # ---------------- Create/Update Release ----------------
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: wolfloom-server-linux
          path: ./dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: wolfloom-server.exe
          path: ./dist

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}     # unique per run
          name: WolfLoom v${{ github.run_number }}
          body: "Automatic build from commit ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
